    <!-- Capture the PWA install prompt as early as possible so the install
         button never misses the browser's beforeinstallprompt event (which
         can fire before the app bundle loads). -->
    <script>
      window.__enInstall = { prompt: null, installed: false };
      window.addEventListener("beforeinstallprompt", function (event) {
        event.preventDefault();
        window.__enInstall.prompt = event;
        window.dispatchEvent(new Event("en:installprompt"));
      });
      window.addEventListener("appinstalled", function () {
        window.__enInstall.prompt = null;
        window.__enInstall.installed = true;
        window.dispatchEvent(new Event("en:appinstalled"));
      });
    </script>
