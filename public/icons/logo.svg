<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" fill="#031d1f"/>
  <defs>
    <linearGradient id="enLogoGradient" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="45%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="enLogoRing" x1="0" y1="24" x2="48" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="enLogoGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Logo scaled to ~76% of canvas (safe zone for maskable icons) -->
  <g transform="translate(61.44 61.44) scale(8.32)">
    <circle cx="24" cy="24" r="21" fill="url(#enLogoGradient)" opacity="0.08"/>
    <path
      d="M 8 28 A 16 16 0 0 1 40 28"
      stroke="url(#enLogoRing)"
      stroke-width="1.75"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />
    <path
      d="M24 5 L39 13.5 V28.5 L24 37 L9 28.5 V13.5 Z"
      stroke="url(#enLogoGradient)"
      stroke-width="2.25"
      stroke-linejoin="round"
      fill="#071210"
      fill-opacity="0.92"
      filter="url(#enLogoGlow)"
    />
    <path
      d="M24 14 L31 24 L24 34 L17 24 Z"
      fill="url(#enLogoGradient)"
      fill-opacity="0.35"
      stroke="url(#enLogoGradient)"
      stroke-width="1.75"
      stroke-linejoin="round"
    />
    <circle cx="24" cy="24" r="3.25" fill="url(#enLogoGradient)"/>
    <line x1="24" y1="24" x2="24" y2="9" stroke="url(#enLogoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="24" y1="24" x2="35.5" y2="30" stroke="url(#enLogoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="24" y1="24" x2="12.5" y2="30" stroke="url(#enLogoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
    <circle cx="24" cy="8" r="2.75" fill="#22d3ee"/>
    <circle cx="36.5" cy="30.5" r="2.75" fill="#34d399"/>
    <circle cx="11.5" cy="30.5" r="2.75" fill="#2dd4bf"/>
    <rect x="22" y="37.5" width="4" height="4" rx="1" transform="rotate(45 24 39.5)" fill="url(#enLogoGradient)" opacity="0.9"/>
  </g>
</svg>
